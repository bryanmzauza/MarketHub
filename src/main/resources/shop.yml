# ============================================
# MarketHub — Loja do Servidor
# ============================================
# Itens que o servidor compra e vende.
# Novos itens são inseridos automaticamente no banco;
# itens já existentes não são sobrescritos (preço dinâmico preservado).
#
# Campos por item:
#   material      - Nome do Material (Bukkit). Ex: DIAMOND, IRON_INGOT
#   display-name  - Nome exibido na loja
#   category      - Categoria para agrupar na GUI
#   price-type    - FIXED (preço fixo) ou DYNAMIC (oferta/demanda)
#   base-price    - Preço base (usado como referência pelo sistema dinâmico)
#   virtual-stock - Estoque virtual inicial
#   target-stock  - Estoque alvo (preço tende ao base quando stock = target)
#   elasticity    - Sensibilidade do preço (0.1 = pouco, 0.6 = muito)
#   price-min     - Preço mínimo permitido
#   price-max     - Preço máximo permitido
# ============================================

